# k8s/k8s-deployment-canary.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-cv-serve-canary
  namespace: ml
  labels:
    app: medical-cv-serve-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medical-cv-serve-canary
  template:
    metadata:
      labels:
        app: medical-cv-serve-canary
      # (Optional) Prometheus scraping – we’ll wire metrics later
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: medical-cv-serve-canary
          image: ghcr.io/yevgeny07/medical-cv-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # Same tracking / MinIO config you use for the main deployment.
            # COPY these from your existing deployment once you re-add them.
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: MLFLOW_REGISTERED_MODEL_NAME
              value: "cxr-demo"

            # 👇 This is the key difference: point at the Candidate alias
            - name: MLFLOW_MODEL_ALIAS
              value: "Candidate"

            # S3/MinIO creds – keep in a Secret in real life
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.ml.svc.cluster.local:9000"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
