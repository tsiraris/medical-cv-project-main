# Deployment — what image to run, how many replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-cv-serve
  namespace: ml
  labels:
    app: medical-cv-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medical-cv-serve
  template:
    metadata:
      labels:
        app: medical-cv-serve
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: medical-cv-serve
          image: ghcr.io/tsiraris/medical-cv-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://host.docker.internal:5500"
            - name: MLFLOW_REGISTERED_MODEL_NAME
              value: "cxr-demo"
            - name: MLFLOW_MODEL_ALIAS
              value: "Production"
            - name: AWS_ACCESS_KEY_ID
              value: "minio"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minio123"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://host.docker.internal:9000"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
