# Deployment — what image to run, how many replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-cv-serve
  namespace: ml
  labels:
    app: medical-cv-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medical-cv-serve
  template:
    metadata:
      labels:
        app: medical-cv-serve
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: medical-cv-serve
          image: ghcr.io/yevgeny07/medical-cv-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: MLFLOW_REGISTERED_MODEL_NAME
              value: "cxr-demo"
            - name: MLFLOW_MODEL_ALIAS
              value: "Production"  
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
