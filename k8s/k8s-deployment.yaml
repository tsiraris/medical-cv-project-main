apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-cv-serve
  namespace: ml
  labels:
    app: medical-cv-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medical-cv-serve
  template:
    metadata:
      labels:
        app: medical-cv-serve
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: medical-cv-serve
          image: ghcr.io/yevgeny07/medical-cv-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
