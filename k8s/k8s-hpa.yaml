apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medical-cv-serve
  namespace: ml
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medical-cv-serve
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
