# Docker Compose file to set up MLflow stack (MLflow Tracking Server with PostgreSQL and MinIO)
services:
  postgres:                        # MLflow tracking DB (runs metadata, params, metrics)
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_DB: mlflow
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:                            # S3-like artifact store (models, plots, …)
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000","9001:9001"]   # 9001 is the MinIO web console
    volumes:
      - ./../.minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:                       # One-shot helper to create the 'mlflow' bucket before MLflow starts
    image: amazon/aws-cli:2.17.39
    entrypoint: [ "sh", "-lc" ]
    command: >
      "aws s3 mb s3://mlflow --endpoint-url http://minio:9000 ||
       aws s3 ls s3://mlflow --endpoint-url http://minio:9000"
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@postgres:5432/mlflow
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_DEFAULT_REGION: us-east-1
      # (optional, also respected by mlflow server)
      MLFLOW_ARTIFACTS_DESTINATION: s3://mlflow/
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir --upgrade pip && \
        pip install --no-cache-dir mlflow==2.18.0 boto3 psycopg2-binary && \
        mlflow server \
          --host=0.0.0.0 \
          --port=5000 \
          --backend-store-uri=${MLFLOW_BACKEND_STORE_URI} \
          --default-artifact-root="s3://mlflow/" \
          --serve-artifacts
    ports:
      - "5500:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

