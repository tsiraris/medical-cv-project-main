name: cd-docker
on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Train placeholder model (creates models/model.joblib)
        run: |
          python scripts/train_model.py
          ls -la models

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-cv-project:latest                # Use the repository owner so the GITHUB_TOKEN (scoped to this repo's owner) ...
            ghcr.io/${{ github.repository_owner }}/medical-cv-project:${{ github.sha }}     # ... actually has push rights. Hardcoding a foreign namespace causes a 403.
          build-args: |
            BUILD_REV=${{ github.sha }}
