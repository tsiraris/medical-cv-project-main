name: train-and-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # CI-safe MLflow: no server
      MLFLOW_TRACKING_URI: "file:./mlruns"
      MLFLOW_EXPERIMENT_NAME: "ci-demo"
      MLFLOW_REGISTERED_MODEL_NAME: "cxr-demo"  # ignored on file backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "mlflow>=2.16,<3" "dvc[s3]>=3,<4" scikit-learn numpy pandas matplotlib boto3 pyyaml joblib
          if [ -f "pyproject.toml" ] || [ -f "setup.cfg" ]; then pip install -e .; fi

      - name: Reproduce pipeline (DVC)
        run: dvc repro

      - name: Show metrics produced in CI
        run: |
          echo "---- metrics/val.json ----"
          cat metrics/val.json || true
          echo "--------------------------"

      - name: Quality gate
        run: python ci/quality_gate.py

      - name: Upload artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            artifacts/**
            metrics/**
            mlruns/**
          if-no-files-found: ignore
