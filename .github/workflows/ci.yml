name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow
          POSTGRES_DB: mlflow
        options: >-
          --health-cmd "pg_isready -U mlflow -d mlflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@localhost:5432/mlflow
      MLFLOW_ARTIFACTS_DESTINATION: file:${{ github.workspace }}/mlruns
      MLFLOW_REGISTERED_MODEL_NAME: cxr-demo
      MLFLOW_MODEL_ALIAS: Production
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "mlflow==2.18.0" psycopg2-binary boto3 requests
          pip install dvc  # file backend is enough in CI
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi

      - name: Start MLflow (local server)
        shell: bash
        run: |
          set -euo pipefail

          python -c "import psycopg2; print('psycopg2 OK')"

          mkdir -p "${MLFLOW_ARTIFACTS_DESTINATION}"
          nohup mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri="${MLFLOW_BACKEND_STORE_URI}" \
            --default-artifact-root="${MLFLOW_ARTIFACTS_DESTINATION}" \
            --serve-artifacts \
            > mlflow.log 2>&1 &

          # Make it available both now (this step) and later (other steps)
          export MLFLOW_TRACKING_URI="http://127.0.0.1:5000"
          echo "MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}" >> "$GITHUB_ENV"

          # Wait until MLflow is reachable (200/404 both OK)
          for i in {1..90}; do
            if curl -sS "${MLFLOW_TRACKING_URI}/" >/dev/null || \
               curl -sS "${MLFLOW_TRACKING_URI}/api/2.0/mlflow/experiments/list" >/dev/null; then
              echo "MLflow is up on ${MLFLOW_TRACKING_URI}"
              break
            fi
            echo "Waiting for MLflow... (${i})"
            sleep 2
          done

          # Diagnostics
          python -c "import os,requests; u=os.environ['MLFLOW_TRACKING_URI']+'/ajax-api/2.0/mlflow/experiments/list'; \
                     print('Probe:', u); print('Status:', requests.get(u, timeout=5).status_code)"
          echo "---- tail mlflow.log (last 100 lines) ----"
          tail -n 100 mlflow.log || true

      - name: Run DVC pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        shell: bash
        run: |
          set -euo pipefail
          dvc repro --force

      - name: Sanity check MLflow API
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        shell: bash
        run: |
          set -euo pipefail
          python -c "import os, mlflow; from mlflow.tracking import MlflowClient; \
                     mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI']); \
                     c = MlflowClient(); \
                     print('Experiments:', [e.name for e in c.search_experiments()]); \
                     print('MLflow OK')"

      - name: Extract RUN_ID from metrics
        shell: bash
        run: |
          set -euo pipefail
          python -c "import json; print(json.load(open('metrics/run_info.json'))['run_id'])" | tee run_id.txt
          echo "RUN_ID=$(cat run_id.txt)" >> "$GITHUB_ENV"

      - name: Register candidate & maybe promote (main only)
        if: github.ref == 'refs/heads/main'
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          RUN_ID: ${{ env.RUN_ID }}
          MLFLOW_REGISTERED_MODEL_NAME: ${{ env.MLFLOW_REGISTERED_MODEL_NAME }}
          TARGET_ALIAS: ${{ env.MLFLOW_MODEL_ALIAS }}      # "Production"
          CANDIDATE_ALIAS: Candidate
          METRICS_PATH: metrics/val.json
          PROMOTE_F1_THRESHOLD: "0.0"
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Registering model, setting Candidate alias, and maybe promoting to Production..."
          python ci/register_and_promote.py

      # >>> ADD THIS BLOCK <<<
      - name: Generate model card (main only)
        if: github.ref == 'refs/heads/main'
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          MLFLOW_REGISTERED_MODEL_NAME: ${{ env.MLFLOW_REGISTERED_MODEL_NAME }}
        run: |
          set -euo pipefail
          echo "Generating model card for latest CI run..."
          python scripts/model_card.py

      - name: Upload model card (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: model-card
          path: model_cards/
      # <<< END NEW BLOCK <<<

      - name: Upload mlflow.log (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-log
          path: mlflow.log

