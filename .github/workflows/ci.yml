name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # optional nightly run

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mlflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d mlflow"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client curl

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "mlflow==2.18.0" \
            "psycopg2-binary" \
            "dvc[s3]==3.63.0" \
            scikit-learn numpy pandas matplotlib pyyaml joblib boto3

      - name: Wait for Postgres
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" >/dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done

      - name: Start MLflow (local server)
        env:
          MLFLOW_BACKEND_STORE_URI: postgresql://postgres:postgres@localhost:5432/mlflow
          MLFLOW_ARTIFACTS_DESTINATION: file://${{ github.workspace }}/mlruns_artifacts
        run: |
          set -euo pipefail

          # sanity: psycopg2 import
          python -c "import psycopg2; print('psycopg2 OK')"

          # start mlflow in background
          nohup mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri \"$MLFLOW_BACKEND_STORE_URI\" \
            --default-artifact-root \"$MLFLOW_ARTIFACTS_DESTINATION\" \
            --serve-artifacts \
            > mlflow.log 2>&1 &

          # export tracking URI for later steps
          echo "MLFLOW_TRACKING_URI=http://127.0.0.1:5000" >> "$GITHUB_ENV"

          # wait until Mlflow answers ML client calls
          for i in $(seq 1 90); do
            python -c "import os, mlflow; from mlflow.tracking import MlflowClient; mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI']); MlflowClient().list_experiments(); print('MLflow client OK')" \
              && break || true
            echo 'Waiting for MLflow... ('$i')'
            sleep 2
          done

          # debug info
          curl -sS http://127.0.0.1:5000/version || true
          echo '---- tail mlflow.log (last 50 lines) ----'
          tail -n 50 mlflow.log || true

      - name: Run DVC pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: dvc repro --force

      - name: Sanity check MLflow API
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          python -c "import os, mlflow; from mlflow.tracking import MlflowClient; mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI']); print('Experiments:', [e.name for e in MlflowClient().list_experiments()]); print('MLflow OK')"

      - name: Extract RUN_ID from metrics
        run: |
          python -c "import json, sys; d=json.load(open('metrics/run_info.json')); ri=d.get('run_id'); print('Run ID:', ri); open('$GITHUB_ENV','a').write(f'RUN_ID={ri}\n')"

      - name: Register model & set alias (main only)
        if: github.ref == 'refs/heads/main'
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          MLFLOW_REGISTERED_MODEL_NAME: cxr-demo
          MLFLOW_MODEL_ALIAS: Production
          RUN_ID: ${{ env.RUN_ID }}
          PROMOTE_F1_THRESHOLD: "0.80"
        run: python ci/register_and_promote.py
