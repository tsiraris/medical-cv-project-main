name: train-and-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # CI-safe MLflow: no server
      MLFLOW_TRACKING_URI: "file:./mlruns"
      MLFLOW_EXPERIMENT_NAME: "ci-demo"
      MLFLOW_REGISTERED_MODEL_NAME: "cxr-demo"  # ignored on file backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "mlflow>=2.16,<3" "dvc[s3]>=3,<4" scikit-learn numpy pandas matplotlib boto3 pyyaml joblib
          if [ -f "pyproject.toml" ] || [ -f "setup.cfg" ]; then pip install -e .; fi

      - name: Reproduce pipeline (DVC)
        run: dvc repro

      - name: Show metrics produced in CI
        run: |
          echo "---- metrics/val.json ----"
          cat metrics/val.json || true
          echo "--------------------------"

      - name: Quality gate
        run: python ci/quality_gate.py

      - name: Upload metrics & model (local copy)
        uses: actions/upload-artifact@v4
        with:
          name: model-and-metrics
          path: |
            metrics/val.json
            models/model.joblib
      
      - name: Register model & set alias (main only)
        if: github.ref == 'refs/heads/main'
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          MLFLOW_REGISTERED_MODEL_NAME: cxr-demo
          TARGET_ALIAS: Production
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          ri = json.loads(Path("metrics/run_info.json").read_text())
          os.environ["RUN_ID"] = ri["run_id"]
          PY
          python ci/register_and_promote.py
