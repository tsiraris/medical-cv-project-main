name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test-register:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: mlflow
          POSTGRES_USER: mlflow
          POSTGRES_DB: mlflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U mlflow -d mlflow"
          --health-interval=5s --health-timeout=3s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------
      # Dependency installation
      # -----------------------------
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found — installing known deps directly"
            pip install dvc[all]==3.51.2 mlflow==2.18.0 boto3 \
                        scikit-learn==1.7.2 numpy pandas matplotlib pyyaml joblib
          fi

      - name: Install AWS CLI (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli
          aws --version

      # -----------------------------
      # Start MinIO and MLflow stack
      # -----------------------------
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -e MINIO_ROOT_USER=minio \
            -e MINIO_ROOT_PASSWORD=minio123 \
            -p 9000:9000 -p 9001:9001 \
            minio/minio:latest server /data --console-address ":9001"
          # Wait for MinIO readiness
          for i in {1..60}; do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              echo "✅ MinIO is ready"
              break
            fi
            echo "Waiting for MinIO..."; sleep 2
          done

      - name: Create MinIO bucket (mlflow)
        env:
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: minio123
        run: |
          aws --endpoint-url http://localhost:9000 s3 mb s3://mlflow || true
          aws --endpoint-url http://localhost:9000 s3 ls

      - name: Start MLflow
        env:
          MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@localhost:5432/mlflow
          MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: minio123
          AWS_DEFAULT_REGION: us-east-1
        run: |
          docker run -d --name mlflow \
            -e MLFLOW_BACKEND_STORE_URI="$MLFLOW_BACKEND_STORE_URI" \
            -e MLFLOW_S3_ENDPOINT_URL="$MLFLOW_S3_ENDPOINT_URL" \
            -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            -e AWS_DEFAULT_REGION="$AWS_DEFAULT_REGION" \
            -p 5000:5000 \
            python:3.11-slim \
            sh -lc "pip install --no-cache-dir mlflow==2.18.0 boto3 psycopg2-binary && \
                    mlflow server \
                      --host=0.0.0.0 \
                      --port=5000 \
                      --backend-store-uri=\$MLFLOW_BACKEND_STORE_URI \
                      --default-artifact-root='s3://mlflow/' \
                      --serve-artifacts"
          # Wait for MLflow readiness
          for i in {1..60}; do
            if curl -fsS http://localhost:5000/api/2.0/mlflow/experiments/list >/dev/null; then
              echo "✅ MLflow is ready"
              break
            fi
            echo "Waiting for MLflow..."; sleep 2
          done

      # -----------------------------
      # Run pipeline & checks
      # -----------------------------
      - name: DVC repro (file backend)
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: dvc repro --force

      - name: Quality gate
        run: python ci/quality_gate.py

      # -----------------------------
      # Register and promote (main only)
      # -----------------------------
      - name: Register model & set alias (main only)
        if: github.ref == 'refs/heads/main'
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minio
          AWS_SECRET_ACCESS_KEY: minio123
          AWS_DEFAULT_REGION: us-east-1
          MLFLOW_REGISTERED_MODEL_NAME: cxr-demo
          TARGET_ALIAS: Production
        run: |
          python - <<'PY'
          import os, json
          from pathlib import Path
          ri = json.loads(Path("metrics/run_info.json").read_text())
          os.environ["RUN_ID"] = ri["run_id"]
          PY
          python ci/register_and_promote.py

      # -----------------------------
      # Upload debugging artifacts
      # -----------------------------
      - name: Upload run artifacts (debug)
        uses: actions/upload-artifact@v4
        with:
          name: ci-run
          path: |
            metrics/val.json
            metrics/run_info.json
            models/model.joblib
