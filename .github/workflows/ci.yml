name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # optional nightly run

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mlflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d mlflow"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client curl

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "mlflow==2.18.0" \
            "psycopg2-binary" \
            "dvc[s3]==3.63.0" \
            scikit-learn numpy pandas matplotlib pyyaml joblib boto3

      - name: Wait for Postgres
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" >/dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done

      - name: Start MLflow (local server)
        shell: bash
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          MLFLOW_BACKEND_STORE_URI: postgresql://postgres:postgres@localhost:5432/mlflow
          MLFLOW_ARTIFACTS_DESTINATION: file://${{ github.workspace }}/mlruns_artifacts
        run: |
          set -euo pipefail

          # Sanity: ensure psycopg2 works
          python - <<'PY'
          import psycopg2
          print("psycopg2 OK")
          PY

          # Launch MLflow in background
          nohup mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}" \
            --default-artifact-root "${MLFLOW_ARTIFACTS_DESTINATION}" \
            --serve-artifacts \
            > mlflow.log 2>&1 &

          echo "MLFLOW_TRACKING_URI=http://127.0.0.1:5000" >> "$GITHUB_ENV"

          # Wait until MLflow responds
          for i in $(seq 1 90); do
            python - <<'PY'
            import os, mlflow
            from mlflow.tracking import MlflowClient
            mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
            _ = MlflowClient().search_experiments()
            print("MLflow client OK")
            PY
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "MLflow is up on http://127.0.0.1:5000"
              break
            fi
            echo "Waiting for MLflow... ($i)"
            sleep 2
          done

          curl -sS http://127.0.0.1:5000/version || true
          echo "---- tail mlflow.log (last 50 lines) ----"
          tail -n 50 mlflow.log || true

      - name: Run DVC pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: dvc repro --force

      - name: Sanity check MLflow API
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          python -c "import os, mlflow; from mlflow.tracking import MlflowClient; mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI']); print('Experiments:', [e.name for e in MlflowClient().list_experiments()]); print('MLflow OK')"

      - name: Extract RUN_ID from metrics
        run: |
          python - <<'PY'
          import json, os, pathlib, sys
          p = pathlib.Path("metrics/run_info.json")
          if not p.exists():
              print("metrics/run_info.json not found", file=sys.stderr)
              sys.exit(1)
          data = json.loads(p.read_text())
          rid = data.get("run_id")
          print("Run ID:", rid)
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"RUN_ID={rid}\n")
          PY

      - name: Register model & set alias (main only)
        if: github.ref == 'refs/heads/main'
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          MLFLOW_REGISTERED_MODEL_NAME: cxr-demo
          MLFLOW_MODEL_ALIAS: Production
          RUN_ID: ${{ env.RUN_ID }}
          PROMOTE_F1_THRESHOLD: "0.80"
        run: python ci/register_and_promote.py
