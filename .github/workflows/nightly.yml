name: Nightly retrain & gate

on:
  schedule:
    - cron: "15 1 * * *"   # 03:15 EEST (Bucharest +2)
  workflow_dispatch: {}

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (file backend)
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          set -euo pipefail
          dvc repro --force

      # Reuse the committed gate script (single source of truth for thresholds: F1 >= 0.80, acc fallback). 
      # It exits non-zero on failure, which fails the job loudly.
      - name: Quality gate (F1 >= 0.80)
        id: gate
        run: |
          set -euo pipefail
          python ci/quality_gate.py
          echo "promote=true" >> "$GITHUB_OUTPUT"

      - name: Generate model card
        if: steps.gate.outputs.promote == 'true'
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          MLFLOW_REGISTERED_MODEL_NAME: cxr-demo
        run: |
          set -euo pipefail
          python scripts/model_card.py

      - name: Upload model card
        if: steps.gate.outputs.promote == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-model-card
          path: model_cards/

      - name: Upload metrics & model (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-model-and-metrics
          path: |
            metrics/val.json
            models/model.joblib
